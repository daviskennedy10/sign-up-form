<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="left-side">
        <div class="banner">
            <img src="odin-lined.png">
            <p>ZEN</p>
        </div>
        <h5>Photo by <a href="index.html"> Halie West</a> on <a href="index.html"> Unsplash</a></h5>
    </div>
    <div class="right-side">
        <div class="top">
            <h2>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams.
                Sign up <em>now</em> to get started. </h2>
            <h3> You <em>know </em>you want to</h3>
        </div>
        <div class="middle">
            <h3>Lets do this!</h3>
            <div class="holder">
                <form action="example.com/path" method="post">
                    <div class="form-left">
                        <label for="first_name"><b>*FIRST NAME</b></label>
                        <input type="text" id="first_name" name="firstname" minlength="2" required>
                        <label for="email"><b>EMAIL</b></label>
                        <input type="email" id="email" name="email">
                        <label for="password"><b>*PASSWORD</b></label>
                        <input type="password" id="password" name="password" minlength="2"  required>
                    </div>
                    <div class="form-right">
                        <label for="last_name"><b>LAST NAME</b></label>
                        <input type="text" id="last_name" name="firstname">
                        <label for="phone"><b>PHONE NUMBER</b></label>
                        <input type="number" id="phone" name="phone">
                        <label for="confrim_password"><b>*CONFIRM PASSWORD</b></label>
                        <input type="password" id="confirm-password" name="conf-password" minlength="2"  required>
                    </div>
            </div>
            </form>
        </div>
        <div class="bottom">
            <div class="box"> Create Account</div>
            <p>Already have an account? Log in</p>
        </div>
    </div>

    
</body>
</html>
